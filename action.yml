name: 'Maida Assert'
description: 'Run Maida behavioral regression checks on agent traces'
inputs:
  agent-script:
    description: 'Python script that runs the agent (must use @trace)'
    required: true
  baseline:
    description: 'Path to baseline JSON file. If omitted, only the policy is enforced.'
    required: false
    default: ''
  policy:
    description: 'Path to policy YAML file.'
    required: false
    default: '.maida/policy.yaml'
  maida-version:
    description: |
      Maida version to use.
      Could be a version number starting with 'v' or a branch name starting with '@'.
      If a github identifier starts with 'v', use '@' prefix.
      Otherwise PyPI will be used.
      Default is "@main".
      Note: this action relies on the statistical `maida run` command.
      Use '@main' until that command is included in a Maida release.
    required: false
    default: '@main'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  extra-args:
    description: 'Additional arguments to pass to maida run'
    required: false
    default: ''
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Check if baseline and policy are provided
      env:
        BASELINE: ${{ inputs.baseline }}
        POLICY: ${{ inputs.policy }}
      shell: bash
      run: |
        # At least one of baseline or policy must be provided
        if [ -z "$BASELINE" ] && [ -z "$POLICY" ]; then
          echo "Either baseline, policy, or both must be provided."
          exit 1
        fi
        # If either is provided, the files must exist
        if [ -n "$BASELINE" ] && [ ! -f "$BASELINE" ]; then
          echo "Baseline file does not exist: $BASELINE"
          exit 2
        fi
        if [ -n "$POLICY" ] && [ ! -f "$POLICY" ]; then
          echo "Policy file does not exist: $POLICY"
          exit 2
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Maida
      env:
        MAIDA_REPO: 'https://github.com/maida-ai/maida.git'
        MAIDA_VERSION: '${{ inputs.maida-version }}'
      shell: bash
      run: |
        if [[ "${MAIDA_VERSION}" == "@"* ]]; then
          # GitHub identifier
          python -m pip install "git+${MAIDA_REPO}${MAIDA_VERSION}"
        elif [[ "${MAIDA_VERSION}" == "v"* ]]; then
          # PyPI version number
          python -m pip install "maida-ai==${MAIDA_VERSION:1}"
        else
          # Let's not allow any other values
          echo "Invalid maida-version: ${MAIDA_VERSION}."
          echo "Maida version must start with 'v' for PyPI version number"
          echo "or '@' for GitHub identifier."
          exit 10
        fi

    - name: Run Maida statistical gate
      shell: bash
      id: gate
      env:
        AGENT_SCRIPT: ${{ inputs.agent-script }}
        BASELINE: ${{ inputs.baseline }}
        POLICY: ${{ inputs.policy }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        ARGS=()
        if [ -n "$BASELINE" ]; then
          ARGS+=(--baseline "$BASELINE")
        fi
        if [ -f "$POLICY" ]; then
          ARGS+=(--policy "$POLICY")
        fi
        if [ -n "$EXTRA_ARGS" ]; then
          read -r -a EXTRA_ARGV <<< "$EXTRA_ARGS"
          ARGS+=("${EXTRA_ARGV[@]}")
        fi
        set +e
        maida run "$AGENT_SCRIPT" "${ARGS[@]}" \
          --format markdown --json-out maida-report.json > maida-report.md
        status=$?
        set -e
        if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
          echo "maida run exited with code $status and did not produce a statistical gate report."
          echo "Ensure agent-script records exactly one completed trace per trial with @trace or traced_run()."
          exit "$status"
        fi

    - name: Prepare GitHub check
      id: check
      shell: bash
      env:
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        DETAILS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        python "$GITHUB_ACTION_PATH/scripts/prepare_check.py" \
          --report maida-report.json \
          --output maida-check-payload.json \
          --head-sha "$HEAD_SHA" \
          --details-url "$DETAILS_URL" >> "$GITHUB_OUTPUT"

    - name: Add local reproduction hint
      shell: bash
      env:
        AGENT_SCRIPT: ${{ inputs.agent-script }}
        BASELINE: ${{ inputs.baseline }}
        POLICY: ${{ inputs.policy }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
        MAIDA_VERSION: ${{ inputs.maida-version }}
      run: |
        {
          echo ""
          echo "---"
          echo ""
          echo "<details>"
          echo "<summary><i>Reproducibility Instructions</i></summary>"
          echo ""
          echo "The \`maida view <id>\` command in this report refers to this CI job's trace store. That ID is not available on your machine until you record a local run."
          echo ""
          echo "From this PR checkout, record a fresh local run and rerun the same assertion inputs:"
          echo ""
          echo '```bash'
          if [[ "$MAIDA_VERSION" == "@"* ]]; then
            printf "python -m pip install %q\n" "git+https://github.com/maida-ai/maida.git${MAIDA_VERSION}"
          elif [[ "$MAIDA_VERSION" == "v"* ]]; then
            printf "python -m pip install %q\n" "maida-ai==${MAIDA_VERSION:1}"
          else
            printf "# Install Maida using the workflow version: %q\n" "$MAIDA_VERSION"
          fi
          printf "maida run %q" "$AGENT_SCRIPT"
          if [ -n "$BASELINE" ]; then
            printf " --baseline %q" "$BASELINE"
          fi
          if [ -n "$POLICY" ]; then
            printf " --policy %q" "$POLICY"
          fi
          if [ -n "$EXTRA_ARGS" ]; then
            printf " %s" "$EXTRA_ARGS"
          fi
          printf "\n"
          echo '```'
          echo ""
          echo "Then run \`maida view <local-id>\` using the ID produced by your local run."
          if [ -n "$BASELINE" ]; then
            echo ""
            echo "If the local behavior change is intentional, accept it explicitly and review the baseline diff:"
            echo ""
            echo '```bash'
            printf "maida diff <local-id> --baseline %q\n" "$BASELINE"
            printf "maida view <local-id>\n"
            printf "maida accept <local-id> --baseline %q --reason %q\n" "$BASELINE" "why this behavior is expected"
            printf "git diff -- %q\n" "$BASELINE"
            echo '```'
          fi
          echo "</details>"
          echo ""
        } >> maida-report.md

    - name: Show PR comment in the action log
      shell: bash
      run: |
        cat maida-report.md

    - name: Publish Maida statistical gate check
      id: publish-check
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh api \
          --method POST \
          --header "Accept: application/vnd.github+json" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          "repos/$GITHUB_REPOSITORY/check-runs" \
          --input maida-check-payload.json

    - name: Warn when check publication is unavailable
      if: steps.publish-check.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::Could not publish the 'Maida statistical gate' check. This is expected for forks or read-only tokens; the gate report and PR comment remain available."

    - name: Post PR comment if possible
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      continue-on-error: true
      uses: marocchino/sticky-pull-request-comment@v3.0.4
      with:
        path: maida-report.md
        hide_and_recreate: true
        hide_classify: "OUTDATED"

    - name: Fail if assertions failed
      shell: bash
      if: steps.check.outputs.verdict == 'fail'
      run: exit 1
