name: 'Maida Assert'
description: 'Run Maida behavioral regression checks on agent traces'
inputs:
  agent-script:
    description: 'Python script that runs the agent (must use @trace)'
    required: true
  baseline:
    description: 'Path to baseline JSON file. If omitted, only the policy is enforced.'
    required: false
    default: ''
  policy:
    description: 'Path to policy YAML file.'
    required: false
    default: '.maida/policy.yaml'
  maida-version:
    description: |
      Maida version to use.
      Could be a version number starting with 'v' or a branch name starting with '@'.
      If a github identifier starts with 'v', use '@' prefix.
      Otherwise PyPI will be used.
      Default is "@main".
    required: false
    default: '@main'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  extra-args:
    description: 'Additional arguments to pass to maida assert'
    required: false
    default: ''
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Check if baseline and policy are provided
      shell: bash
      run: |
        # At least one of baseline or policy must be provided
        if [ -z "${{ inputs.baseline }}" ] && [ -z "${{ inputs.policy }}" ]; then
          echo "Either baseline, policy, or both must be provided."
          exit 1
        fi
        # If either is provided, the files must exist
        if [ -n "${{ inputs.baseline }}" ] && [ ! -f "${{ inputs.baseline }}" ]; then
          echo "Baseline file does not exist: ${{ inputs.baseline }}"
          exit 2
        fi
        if [ -n "${{ inputs.policy }}" ] && [ ! -f "${{ inputs.policy }}" ]; then
          echo "Policy file does not exist: ${{ inputs.policy }}"
          exit 2
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Maida
      env:
        MAIDA_REPO: 'https://github.com/maida-ai/maida.git'
        MAIDA_VERSION: '${{ inputs.maida-version }}'
      shell: bash
      run: |
        if [[ "${MAIDA_VERSION}" == "@"* ]]; then
          # GitHub identifier
          python -m pip install "git+${MAIDA_REPO}${MAIDA_VERSION}"
        elif [[ "${MAIDA_VERSION}" == "v"* ]]; then
          # PyPI version number
          python -m pip install "maida==${MAIDA_VERSION:1}"
        else
          # Let's not allow any other values
          echo "Invalid maida-version: ${MAIDA_VERSION}."
          echo "Maida version must start with 'v' for PyPI version number"
          echo "or '@' for GitHub identifier."
          exit 10
        fi

    - name: Run agent
      shell: bash
      run: python "${{ inputs.agent-script }}"

    - name: Get latest run ID
      shell: bash
      id: get-run
      run: |
        RUN_ID=$(maida list --json | python -c "import sys,json; data=json.load(sys.stdin); runs=data.get('runs') or []; run=runs[0] if runs else {}; print(run.get('trace_id') or run.get('run_id') or '')")
        if [ -z "$RUN_ID" ]; then
          echo "No Maida run found. Ensure agent-script records a traced run with @trace or traced_run()."
          exit 3
        fi
        echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

    - name: Run assertions
      shell: bash
      id: assert
      run: |
        ARGS=""
        if [ -n "${{ inputs.baseline }}" ]; then
          ARGS="$ARGS --baseline ${{ inputs.baseline }}"
        fi
        if [ -f "${{ inputs.policy }}" ]; then
          ARGS="$ARGS --policy ${{ inputs.policy }}"
        fi
        if [ -n "${{ inputs.extra-args }}" ]; then
          ARGS="$ARGS ${{ inputs.extra-args }}"
        fi
        maida assert "${{ steps.get-run.outputs.run_id }}" $ARGS --format markdown > maida-report.md || echo "assert_failed=true" >> $GITHUB_OUTPUT

    - name: Show PR comment in the action log
      shell: bash
      run: |
        cat maida-report.md

    - name: Post PR comment if possible
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      continue-on-error: true
      uses: marocchino/sticky-pull-request-comment@v3.0.4
      with:
        path: maida-report.md
        hide_and_recreate: true
        hide_classify: "OUTDATED"

    - name: Fail if assertions failed
      shell: bash
      if: steps.assert.outputs.assert_failed == 'true'
      run: exit 1
