name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      # Uses the local composite action (./action.yml) so CI always
      # tests the version checked into this branch.
      - uses: ./
        with:
          agent-script: examples/ci_dummy_agent.py
          policy: .maida/policy.yaml
          maida-version: '@main'
          post-comment: 'true'
